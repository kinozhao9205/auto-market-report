<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试上传功能</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .btn { padding: 10px 20px; margin: 10px 0; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 4px; }
        .btn-secondary { background: #6c757d; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #cce5ff; color: #004085; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; font-size: 12px; }
        input { width: 100%; padding: 8px; margin: 5px 0; }
    </style>
</head>
<body>
    <h1>🚀 测试 GitHub 上传功能</h1>
    
    <div>
        <label>GitHub Token:</label>
        <input type="password" id="token" placeholder="ghp_xxxxxxxx">
    </div>
    
    <div>
        <label>测试内容（中文）:</label>
        <input type="text" id="testContent" value="海尔发布AI之眼2.0科技测试">
    </div>
    
    <button class="btn" onclick="testUpload()">测试上传</button>
    <button class="btn btn-secondary" onclick="testBase64()">测试 Base64 编码</button>
    
    <div id="status"></div>
    <div id="result"></div>

    <script>
        const REPO = 'kinozhao9205/auto-market-report';
        const FILE = 'test_upload_check.html';
        
        function showStatus(msg, type) {
            document.getElementById('status').innerHTML = `<div class="status ${type}">${msg}</div>`;
        }
        
        function showResult(html) {
            document.getElementById('result').innerHTML = html;
        }
        
        // 正确的 Base64 编码函数
        function utf8ToBase64(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, 
                (match, p1) => String.fromCharCode('0x' + p1)));
        }
        
        function testBase64() {
            const content = document.getElementById('testContent').value;
            const encoded = utf8ToBase64(content);
            const decoded = decodeURIComponent(atob(encoded).split('').map(c => 
                '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
            
            showResult(`
                <h3>Base64 编码测试</h3>
                <p><strong>原始内容:</strong> ${content}</p>
                <p><strong>编码后:</strong> ${encoded}</p>
                <p><strong>解码后:</strong> ${decoded}</p>
                <p><strong>匹配:</strong> ${content === decoded ? '✅ 是' : '❌ 否'}</p>
            `);
        }
        
        async function testUpload() {
            const token = document.getElementById('token').value;
            if (!token) {
                showStatus('请输入 GitHub Token', 'error');
                return;
            }
            
            const testContent = `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>测试</title></head>
<body>
<h1>测试上传功能</h1>
<p>测试时间: ${new Date().toLocaleString()}</p>
<p>测试内容: ${document.getElementById('testContent').value}</p>
<p>随机数: ${Math.random()}</p>
</body>
</html>`;
            
            showStatus('正在获取文件 SHA...', 'info');
            
            try {
                // 获取 SHA
                const shaRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                
                let sha = '';
                if (shaRes.status === 404) {
                    showStatus('文件不存在，将创建新文件', 'info');
                } else if (shaRes.ok) {
                    const shaData = await shaRes.json();
                    sha = shaData.sha;
                    showStatus(`获取到 SHA: ${sha.substring(0, 8)}...`, 'info');
                } else {
                    throw new Error('获取 SHA 失败: ' + shaRes.status);
                }
                
                // 上传
                showStatus('正在上传...', 'info');
                
                const body = {
                    message: 'test: 测试上传功能',
                    content: utf8ToBase64(testContent),
                    branch: 'main'
                };
                if (sha) body.sha = sha;
                
                const uploadRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
                
                if (uploadRes.ok) {
                    const result = await uploadRes.json();
                    showStatus('✅ 上传成功！', 'success');
                    showResult(`
                        <h3>上传结果</h3>
                        <p>文件: <a href="${result.content.html_url}" target="_blank">${result.content.html_url}</a></p>
                        <p>访问: <a href="https://kinozhao9205.github.io/auto-market-report/${FILE}" target="_blank">https://kinozhao9205.github.io/auto-market-report/${FILE}</a></p>
                        <pre>${JSON.stringify(result, null, 2)}</pre>
                    `);
                } else {
                    const error = await uploadRes.json();
                    showStatus('❌ 上传失败', 'error');
                    showResult(`<pre>${JSON.stringify(error, null, 2)}</pre>`);
                }
            } catch (e) {
                showStatus('❌ 错误: ' + e.message, 'error');
            }
        }
    </script>
</body>
</html>
