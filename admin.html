<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盛世消费体验研究院 - 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #f0f2f5; min-height: 100vh; }
        .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .admin-page { display: none; }
        .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .btn-primary { background: #e94560; color: white; }
        .btn-primary:hover { background: #d63850; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-success { background: #28a745; color: white; }
        .input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .input:focus { outline: none; border-color: #e94560; }
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 12px; }
        .nav-tab { padding: 8px 16px; border-radius: 8px; cursor: pointer; background: #f8f9fa; border: none; }
        .nav-tab.active { background: #e94560; color: white; }
        .report-item { padding: 16px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; }
        .report-item:hover { border-color: #e94560; background: #fefefe; }
        .report-item.disabled { opacity: 0.5; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 12px; padding: 24px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; margin-bottom: 6px; font-weight: 500; color: #333; }
        textarea.input { min-height: 120px; resize: vertical; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-danger { background: #f8d7da; color: #721c24; }
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #333; }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div id="loginPage" class="login-page">
        <div class="card" style="width: 400px;">
            <div style="text-align: center; margin-bottom: 24px;">
                <h1 style="color: #e94560; font-size: 24px; margin-bottom: 8px;">盛世消费体验研究院</h1>
                <p style="color: #666; font-size: 14px;">管理后台</p>
            </div>
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" id="username" class="input" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" id="password" class="input" placeholder="请输入密码">
            </div>
            <button onclick="login()" class="btn btn-primary" style="width: 100%;">登录</button>
            <p id="loginError" style="color: #dc3545; font-size: 13px; margin-top: 12px; display: none;"></p>
        </div>
    </div>

    <!-- 管理后台 -->
    <div id="adminPage" class="admin-page" style="padding: 20px;">
        <div class="container" style="max-width: 1200px; margin: 0 auto;">
            <!-- 顶部导航 -->
            <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1 style="color: #e94560; font-size: 20px;">管理后台</h1>
                    <p style="color: #666; font-size: 13px;">盛世消费体验研究院</p>
                </div>
                <div>
                    <button onclick="logout()" class="btn btn-secondary">退出登录</button>
                </div>
            </div>

            <!-- 标签页 -->
            <div class="nav-tabs">
                <button class="nav-tab active" onclick="showTab('reports')">报告编辑</button>
                <button class="nav-tab" onclick="showTab('index')">目录管理</button>
                <button class="nav-tab" onclick="showTab('settings')">账号管理</button>
            </div>

            <!-- 报告编辑 -->
            <div id="tabReports">
                <div class="card">
                    <h2 class="section-title">选择要编辑的报告</h2>
                    <div id="reportList"></div>
                </div>
            </div>

            <!-- 目录管理 -->
            <div id="tabIndex" style="display: none;">
                <div class="card">
                    <h2 class="section-title">目录显示管理</h2>
                    <div class="form-group">
                        <label class="form-label">当前周期（第几周）</label>
                        <select id="currentCycle" class="input" style="width: 200px;">
                            <option value="1">第1周 - 家电</option>
                            <option value="2">第2周 - 数码</option>
                            <option value="3">第3周 - 汽车</option>
                            <option value="4">第4周 - 综合</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">是否在目录中显示当期报告</label>
                        <div style="display: flex; gap: 20px; margin-top: 8px;">
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                <input type="radio" name="showCurrent" value="true" checked> 显示
                            </label>
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                <input type="radio" name="showCurrent" value="false"> 隐藏
                            </label>
                        </div>
                    </div>
                    <button onclick="saveIndexConfig()" class="btn btn-primary">保存目录配置</button>
                </div>
            </div>

            <!-- 账号管理 -->
            <div id="tabSettings" style="display: none;">
                <div class="card">
                    <h2 class="section-title">修改密码</h2>
                    <div class="form-group">
                        <label class="form-label">当前密码</label>
                        <input type="password" id="oldPassword" class="input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">新密码</label>
                        <input type="password" id="newPassword" class="input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">确认新密码</label>
                        <input type="password" id="confirmPassword" class="input">
                    </div>
                    <button onclick="changePassword()" class="btn btn-primary">修改密码</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑弹窗 -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2 class="section-title" id="modalTitle">编辑报告内容</h2>
            <div class="form-group">
                <label class="form-label">报告标题</label>
                <input type="text" id="editTitle" class="input">
            </div>
            <div class="form-group">
                <label class="form-label">报告摘要（用于推送）</label>
                <textarea id="editSummary" class="input" placeholder="用于钉钉/微信推送的摘要文字"></textarea>
            </div>
            <div id="newsItemsContainer">
                <label class="form-label">新闻条目</label>
                <div id="newsItemsList"></div>
                <button onclick="addNewsItem()" class="btn btn-secondary" style="margin-top: 12px;">+ 添加新闻条目</button>
            </div>
            <div style="margin-top: 20px; display: flex; gap: 12px; justify-content: flex-end;">
                <button onclick="closeEditModal()" class="btn btn-secondary">取消</button>
                <button onclick="saveReport()" class="btn btn-success">保存并下载</button>
            </div>
            <p style="margin-top: 16px; font-size: 13px; color: #666; background: #fff3cd; padding: 12px; border-radius: 8px;">
                💡 保存后将生成可下载的 HTML 文件，需要手动上传到 GitHub 替换原有文件
            </p>
        </div>
    </div>

    <script>
        // 管理员账号配置
        const ADMIN_USERS = {
            'admin': 'market2026',
            'editor': 'report123'
        };

        // 报告文件配置
        const REPORTS = [
            { key: 'home', name: '家电', file: 'home_2026-03-23.html', cycle: 1 },
            { key: 'digital', name: '数码', file: 'digital_2026-03-23.html', cycle: 2 },
            { key: 'auto', name: '汽车', file: 'auto_2026-03-23.html', cycle: 3 },
            { key: 'comprehensive', name: '综合', file: 'comprehensive_2026-03-23.html', cycle: 4 },
            // 可添加更多历史报告
            { key: 'home_old', name: '家电(历史)', file: 'home_2026-03-02.html', cycle: 1 },
            { key: 'digital_old', name: '数码(历史)', file: 'digital_2026-03-09.html', cycle: 2 },
            { key: 'auto_old', name: '汽车(历史)', file: 'auto_2026-03-16.html', cycle: 3 },
        ];

        let currentReport = null;
        let currentNewsItems = [];

        // 检查登录状态
        function checkLogin() {
            const isLoggedIn = localStorage.getItem('adminLoggedIn');
            if (isLoggedIn) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminPage').style.display = 'block';
                loadReports();
            }
        }

        // 登录
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');

            if (ADMIN_USERS[username] && ADMIN_USERS[username] === password) {
                localStorage.setItem('adminLoggedIn', 'true');
                localStorage.setItem('adminUser', username);
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminPage').style.display = 'block';
                loadReports();
                errorEl.style.display = 'none';
            } else {
                errorEl.textContent = '用户名或密码错误';
                errorEl.style.display = 'block';
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('adminLoggedIn');
            localStorage.removeItem('adminUser');
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('adminPage').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        // 切换标签页
        function showTab(tab) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('tabReports').style.display = 'none';
            document.getElementById('tabIndex').style.display = 'none';
            document.getElementById('tabSettings').style.display = 'none';
            
            document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).style.display = 'block';
        }

        // 加载报告列表
        function loadReports() {
            const container = document.getElementById('reportList');
            container.innerHTML = '';

            // 加载目录配置
            const indexConfig = JSON.parse(localStorage.getItem('indexConfig') || '{}');

            REPORTS.forEach(report => {
                const div = document.createElement('div');
                div.className = 'report-item';
                
                // 检查是否被隐藏
                const isHidden = indexConfig.hiddenReports && indexConfig.hiddenReports.includes(report.key);
                if (isHidden) div.classList.add('disabled');

                div.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <strong>${report.name}</strong>
                            <span style="color: #666; font-size: 13px; margin-left: 8px;">${report.file}</span>
                            ${isHidden ? '<span class="badge badge-danger" style="margin-left: 8px;">已隐藏</span>' : ''}
                        </div>
                        <button class="btn btn-primary" style="padding: 6px 12px; font-size: 13px;">编辑</button>
                    </div>
                `;
                div.onclick = () => openEditModal(report);
                container.appendChild(div);
            });
        }

        // 打开编辑弹窗
        function openEditModal(report) {
            currentReport = report;
            document.getElementById('modalTitle').textContent = `编辑 ${report.name} 报告`;
            
            // 从 localStorage 读取已保存的数据
            const savedData = JSON.parse(localStorage.getItem('report_' + report.key) || '{}');
            
            document.getElementById('editTitle').value = savedData.title || getDefaultTitle(report);
            document.getElementById('editSummary').value = savedData.summary || getDefaultSummary(report);
            
            // 加载新闻条目
            currentNewsItems = savedData.newsItems || getDefaultNewsItems(report);
            renderNewsItems();
            
            document.getElementById('editModal').classList.add('active');
        }

        // 关闭编辑弹窗
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        // 获取默认标题
        function getDefaultTitle(report) {
            const titles = {
                'home': '🏠 家电行业每周情报',
                'digital': '📱 数码行业每周情报',
                'auto': '🚗 汽车市场每周情报',
                'comprehensive': '📊 综合市场每周情报'
            };
            return titles[report.key] || report.name + '情报';
        }

        // 获取默认摘要
        function getDefaultSummary(report) {
            const summaries = {
                'home': '本周家电行业情报：家电以旧换新政策最新动态，AWE 2026展会亮点，智能家居新品发布',
                'digital': '本周数码行业情报：MWC 2026最新产品，折叠屏手机市场动态，AI终端设备发展趋势',
                'auto': '本周汽车市场情报：新能源汽车销量数据新车上市动态，行业政策最新解读',
                'comprehensive': '本周综合情报汇总：家电、数码、汽车行业最新动态一网打尽'
            };
            return summaries[report.key] || '';
        }

        // 获取默认新闻条目
        function getDefaultNewsItems(report) {
            return [
                {
                    title: '新闻标题',
                    content: '新闻内容...',
                    source: '来源网站',
                    category: report.key === 'comprehensive' ? 'home' : report.key
                }
            ];
        }

        // 渲染新闻条目
        function renderNewsItems() {
            const container = document.getElementById('newsItemsList');
            container.innerHTML = '';
            
            currentNewsItems.forEach((item, index) => {
                const div = document.createElement('div');
                div.style.cssText = 'padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 12px; background: #fafafa;';
                div.innerHTML = `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <strong>新闻条目 ${index + 1}</strong>
                        <button onclick="removeNewsItem(${index})" style="color: #dc3545; background: none; border: none; cursor: pointer;">删除</button>
                    </div>
                    <div class="form-group">
                        <input type="text" class="input" placeholder="新闻标题" value="${item.title}" onchange="updateNewsItem(${index}, 'title', this.value)">
                    </div>
                    <div class="form-group">
                        <textarea class="input" placeholder="新闻内容" onchange="updateNewsItem(${index}, 'content', this.value)">${item.content}</textarea>
                    </div>
                    <div class="form-group">
                        <input type="text" class="input" placeholder="来源链接" value="${item.source}" onchange="updateNewsItem(${index}, 'source', this.value)">
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // 添加新闻条目
        function addNewsItem() {
            currentNewsItems.push({
                title: '',
                content: '',
                source: '',
                category: 'home'
            });
            renderNewsItems();
        }

        // 删除新闻条目
        function removeNewsItem(index) {
            currentNewsItems.splice(index, 1);
            renderNewsItems();
        }

        // 更新新闻条目
        function updateNewsItem(index, field, value) {
            currentNewsItems[index][field] = value;
        }

        // 保存报告
        function saveReport() {
            const title = document.getElementById('editTitle').value;
            const summary = document.getElementById('editSummary').value;
            
            // 保存到 localStorage
            const data = {
                title,
                summary,
                newsItems: currentNewsItems,
                updatedAt: new Date().toISOString()
            };
            localStorage.setItem('report_' + currentReport.key, JSON.stringify(data));
            
            alert('已保存到浏览器本地存储！\n\n点击"下载HTML"按钮下载文件，然后上传到 GitHub 替换原文件。');
            closeEditModal();
            loadReports();
        }

        // 下载HTML文件
        function downloadHTML() {
            // 这里可以生成完整的HTML文件
            // 简化版本：提示用户手动编辑
            alert('功能开发中，请先保存当前编辑内容');
        }

        // 保存目录配置
        function saveIndexConfig() {
            const currentCycle = document.getElementById('currentCycle').value;
            const showCurrent = document.querySelector('input[name="showCurrent"]:checked').value;
            
            const config = {
                currentCycle: parseInt(currentCycle),
                showCurrent: showCurrent === 'true',
                updatedAt: new Date().toISOString()
            };
            
            localStorage.setItem('indexConfig', JSON.stringify(config));
            alert('目录配置已保存！\n\n请下载配置文件或手动在 index.html 中更新。');
            loadReports();
        }

        // 修改密码
        function changePassword() {
            const oldPwd = document.getElementById('oldPassword').value;
            const newPwd = document.getElementById('newPassword').value;
            const confirmPwd = document.getElementById('confirmPassword').value;
            const currentUser = localStorage.getItem('adminUser');
            
            if (ADMIN_USERS[currentUser] !== oldPwd) {
                alert('当前密码错误');
                return;
            }
            
            if (newPwd !== confirmPwd) {
                alert('两次输入的密码不一致');
                return;
            }
            
            if (newPwd.length < 4) {
                alert('密码长度至少4位');
                return;
            }
            
            // 更新密码（注意：这种方式在静态页面中重启浏览器会失效，仅作演示）
            ADMIN_USERS[currentUser] = newPwd;
            alert('密码修改成功！');
            
            document.getElementById('oldPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        }

        // 初始化
        checkLogin();
    </script>
</body>
</html>
